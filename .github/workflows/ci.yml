name: CI Pipeline
on: [pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest flake8
      - name: Lint
        run: flake8 . --max-line-length=120
      - name: Test
        run: pytest Tests/Tests.py -v
